name: Weekly Tennis Data Update

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install pandas numpy xgboost lightgbm catboost \
                    scikit-learn joblib requests

    - name: Clone tennis data
      run: |
        git clone https://github.com/JeffSackmann/tennis_atp.git
        git clone https://github.com/JeffSackmann/tennis_wta.git

    - name: Run update script
      run: python update_model.py

    - name: Commit updated ELO
      run: |
        git config user.email "action@github.com"
        git config user.name "GitHub Action"
        git add elo_snapshot.json
        git diff --staged --quiet || git commit -m "Weekly ELO update $(date +%Y-%m-%d)"
        git push
```

---

